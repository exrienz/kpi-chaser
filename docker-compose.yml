version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      HTTP_ADDRESS: ":8080"
      DATABASE_PATH: /data/kpi-journal.db
      JWT_SECRET: change-me
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - app_data:/data

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: ["/app/worker"]
    environment:
      DATABASE_PATH: /data/kpi-journal.db
      JWT_SECRET: change-me
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - app_data:/data
    depends_on:
      - api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app_data:
