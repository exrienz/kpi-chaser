services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      HTTP_ADDRESS: ":8080"
      DATABASE_PATH: /data/kpi-journal.db
      JWT_SECRET: change-me
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - app_data:/data

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: ["/app/worker"]
    environment:
      DATABASE_PATH: /data/kpi-journal.db
      JWT_SECRET: change-me
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - app_data:/data
    depends_on:
      - api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_PROXY_TARGET: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  app_data:
